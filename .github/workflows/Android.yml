name: Android Arm64 Full Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Build tag (e.g. v0.3.0)"
        required: true

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android (Full Features)
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r29-beta1
      ANDROID_API: 35
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install NDK ${{ env.NDK_VERSION }}
        run: |
          mkdir -p $ANDROID_HOME/ndk
          curl -L https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip -o ndk.zip
          unzip -q ndk.zip -d $ANDROID_HOME/ndk
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/android-ndk-${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: android-arm64-full-api35-v2

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Build Full Release Binary
        run: |
          export RUSTFLAGS="-C link-arg=-z -C link-arg=max-page-size=16384"
          
          cargo zigbuild --release --locked \
            --target aarch64-linux-android.${{ env.ANDROID_API }} \
            --features full \
            --bin mihomo

      - name: Post-Build Strip
        run: |
          ${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip \
            target/aarch64-linux-android/release/mihomo

      - name: Package Artifacts
        id: pkg
        run: |
          set -euo pipefail
          ref="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          name="mihomo-${ref}-android-arm64-full-api35"
          staging="dist/${name}"
          
          mkdir -p "${staging}"
          cp "target/aarch64-linux-android/release/mihomo" "${staging}/"
          cp README.md LICENSE "${staging}/" 2>/dev/null || true
          
          cd dist
          tar -czf "${name}.tar.gz" "${name}"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          
          echo "archive=${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-android-full-api35
          path: |
            dist/${{ steps.pkg.outputs.archive }}
            dist/${{ steps.pkg.outputs.checksum }}
          retention-days: 14
